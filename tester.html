<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Proxima+Nova:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-tester.css">
    <title>ICAO ENGLISH APP</title>
</head>
<body>
  <div id="side-tab">
    <div id="side-tab-header">
      <img id ="close-icon" onclick="closeSideTab()" src="icons/close-icon.svg" alt="Close Icon" width="25" height="25">
    </div>
    <div id="side-tab-content"></div>
  </div> 
    <header>
    
    <img id ="arrow" onclick="loadPreviousQuestion()" src="icons/arrow-left-icon.svg" alt="Close Icon" width="25" height="25">

        <h1></h1>
        <img id ="arrow" onclick="loadNextQuestion()" src="icons/arrow-right-icon.svg" alt="Close Icon" width="25" height="25">

    </header>

    <main> 
      <div id="block-tester">
        <div id="question"><h3>Here comes the question</h3></div>
        <div id="answer1" class="answer" onclick="selectAnswer(0)"><p>Answer 1 place</p></div>
        <div id="answer2" class="answer" onclick="selectAnswer(1)"><p>Answer 2 place</p></div>
        <div id="answer3" class="answer" onclick="selectAnswer(2)"><p>Answer 3 place</p></div>
        <div id="answer4" class="answer" onclick="selectAnswer(3)"><p>Answer 4 place</p></div>

        <div id="questions-container"></div>
      </div> 


    </main>

    <footer>
        <div id="footer-elements">
        <div id="footer-icons">
          <div id="footer-icon">
            <img id ="close-icon" onclick="showComment()" src="icons/comment-icon.svg" alt="Close Icon" width="25" height="25">
          </div>
          <div id="footer-icon">
            <img id ="close-icon" onclick="showNote()" src="icons/note-icon.svg" alt="Close Icon" width="25" height="25"> 
          </div>    
        </div>
        <div id="footer-buttons">
          <button id="explanation-button" class="button" onclick="showExplanation()">Explanation</button>
          <button id="test-button" class="button" class="sc-fPXMVe kDaUxQ" onclick="checkAnswer()">Submit
          </button>
        </div>
    </footer>


<div class="overlay" id="overlay"></div>
<div id="alert-box">
  <h3>Do you want to finnish the test?</h3>
  <div id="alert-box-button" class="alert-box-button" onclick="finishQuiz()"><p>Yes and see the result</p></div>
  <div id="alert-box-button" class="alert-box-button" onclick="hideOverlayAndAlertBox()"><p>No, continue the test</p></div>
</div>  




</body>
<script src="script.js"></script>
<script src="script-tester.js"></script>
<script src="buttons.js"></script>
</html>
